version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: family_postgres
    environment:
      POSTGRES_DB: family_tree
      POSTGRES_USER: family
      POSTGRES_PASSWORD: family
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U family"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: family_redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: family_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
    container_name: family_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/family_tree
      SPRING_DATASOURCE_USERNAME: family
      SPRING_DATASOURCE_PASSWORD: family
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: dev_secret_key
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: family_frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

  nginx:
    build:
      context: ./nginx
    container_name: family_nginx
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"

volumes:
  postgres_data:
  minio_data:
